<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Prisma Tienda de Objetos</title>

<style>
  body {
    margin: 0;
    font-family: sans-serif;
    scroll-behavior: smooth;
  }

  section {
    width: 100%;
    height: 100vh;
  }

  /* VIDRIERA */
  .vidriera {
    background-image: url('fachada2.jpg');
    background-size: cover;
    background-position: center;
  }

  /* INTERIOR */
  .interior {
    background-image: url('interior.jpg');
    background-size: cover;
    background-position: center;
  }

  /* BOTÓN ENTRAR */
  .boton {
    position: absolute;
    bottom: 40px;
    left: 50%;
    transform: translateX(-50%);
    padding: 12px 20px;
    background: rgba(0,0,0,0.6);
    color: white;
    border-radius: 8px;
    text-decoration: none;
  }
</style>

</head>

<body>

<!-- VIDRIERA -->
<section class="vidriera">
  <a href="#interior" class="boton">Entrar</a>
</section>

<!-- INTERIOR -->
<section id="interior" class="interior"></section>

</body>
</html>
