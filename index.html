<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Prisma Tienda de Objetos</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body { overflow-x: hidden; }
  body { font-family: sans-serif; }

  section {
    width: 100%;
    position: relative;
    line-height: 0;
  }

  section img.fondo {
    width: 100%;
    display: block;
  }

  .boton {
    position: absolute;
    top: 62%;
    left: 32%;
    transform: translateX(-50%);
    padding: 12px 20px;
    background: rgba(0,0,0,0.6);
    color: white;
    border-radius: 8px;
    text-decoration: none;
    font-size: 16px;
  }

  .objeto {
    position: absolute;
    width: 80px;
    cursor: pointer;
    transition: transform 0.2s;
  }

  .objeto:hover { transform: scale(1.1); }

  #popup {
    display: none;
    position: fixed;
    top: 50%;
    left: 50%;
    transform: translate(-50%,-50%);
    background: #fff8f0;
    padding: 20px;
    border-radius: 10px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.3);
    text-align: center;
    z-index: 999;
  }

  #popup button { margin-top: 10px; }
</style>
</head>
<body>

<!-- VIDRIERA -->
<section>
  <img src="fachada2.jpg" class="fondo">
  <a href="#interior" class="boton">Entrar</a>
</section>

<!-- INTERIOR -->
<section id="interior">
  <img src="interior.jpeg" class="fondo">

  <img src="objeto1.png" class="objeto"
       style="top:55%; left:45%;"
       onclick="mostrar('Vasija Terracota', '$18.000')">

  <img src="objeto2.png" class="objeto"
       style="top:60%; left:65%;"
       onclick="mostrar('Reloj Antiguo', '$25.000')">
</section>

<!-- POPUP -->
<div id="popup">
  <h3 id="titulo"></h3>
  <p id="precio"></p>
  <button onclick="cerrar()">Cerrar</button>
</div>

<script>
function mostrar(nombre, precio){
  document.getElementById('popup').style.display = 'block';
  document.getElementById('titulo').innerText = nombre;
  document.getElementById('precio').innerText = precio;
}
function cerrar(){
  document.getElementById('popup').style.display = 'none';
}
</script>

</body>
</html>
